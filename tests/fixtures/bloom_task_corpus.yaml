# Bloom Task Corpus — For testing Issue #53 Dynamic Model Routing
# L1-L6: 3 tasks each = 18 tasks total
# Purpose: Used for Bloom Classification Accuracy Test (Dim B) / Output Quality Comparison Experiment (Dim D)
# verifiable_condition: Automatically verifiable pass/fail criteria

bloom_tasks:

  # ─────────────────────────────────────────────
  # L1: Remember — pattern application, routine processing
  # Correctness Criterion: Correct value is modified/retrieved
  # ─────────────────────────────────────────────

  - id: L1-01
    bloom_level: 1
    category: remember
    description: |
      Read the current value of ntfy_topic from config/settings.yaml and report it as is.
    expected_output_type: exact_value
    verifiable_condition: "output matches value in settings.yaml ntfy_topic"
    difficulty: trivial
    notes: "YAML reading only. No inference required."

  - id: L1-02
    bloom_level: 1
    category: remember
    description: |
      Return a list of files existing in the queue/inbox/ directory.
      Listing only the filenames is sufficient.
    expected_output_type: file_list
    verifiable_condition: "output matches ls queue/inbox/"
    difficulty: trivial
    notes: "Directory listing only."

  - id: L1-03
    bloom_level: 1
    category: remember
    description: |
      Count the total number of lines in lib/cli_adapter.sh and report it.
    expected_output_type: number
    verifiable_condition: "output matches wc -l lib/cli_adapter.sh"
    difficulty: trivial
    notes: "Command execution output report only."

  # ─────────────────────────────────────────────
  # L2: Understand — explanation, summarization, paraphrasing
  # Correctness Criterion: Explanation containing specified key points
  # ─────────────────────────────────────────────

  - id: L2-01
    bloom_level: 2
    category: understand
    description: |
      Explain what the get_recommended_model() function in lib/cli_adapter.sh does,
      in 3 sentences or less, including the following 3 points:
      (1) What is the input, (2) What is the output, (3) How it performs cost optimization.
    expected_output_type: explanation
    verifiable_condition: "explanation contains: bloom_level as input, model name as output, cost_group priority"
    difficulty: easy
    notes: "Code comprehension + explanation. No implementation required."

  - id: L2-02
    bloom_level: 2
    category: understand
    description: |
      Explain in 2 sentences why scripts/inbox_write.sh uses flock.
      Include "why flock is necessary" and "what happens without flock".
    expected_output_type: explanation
    verifiable_condition: "explanation contains: concurrent writes, race condition, data corruption"
    difficulty: easy
    notes: "Flock concept understanding verification."

  - id: L2-03
    bloom_level: 2
    category: understand
    description: |
      Explain what happens (or doesn't happen) in the current implementation when changing bloom_routing from "off" to "auto" in config/settings.yaml.
      Explain what happens (or doesn't happen) in the current implementation when changing bloom_routing from "off" to "auto" in config/settings.yaml.
    expected_output_type: explanation
    verifiable_condition: "explanation states: currently nothing happens, orchestrator.md not wired, Phase 2-4 not integrated"
    difficulty: medium
    notes: "Check understanding of current implementation. 'Will not work even if changed' is the correct answer."

  # ─────────────────────────────────────────────
  # L3: Apply — implementation of known patterns
  # Correctness Criterion: File is correctly created/executed
  # ─────────────────────────────────────────────

  - id: L3-01
    bloom_level: 3
    category: apply
    description: |
      Create settings_spark_only.yaml in tests/fixtures/.
      Content: Define only gpt-5.3-codex-spark (max_bloom: 3, cost_group: chatgpt_pro) in capability_tiers.
      Include bloom_routing: "off".
    expected_output_type: file_created
    verifiable_condition: "file exists AND yaml valid AND only spark in capability_tiers"
    difficulty: easy
    notes: "Application of existing YAML patterns."

  - id: L3-02
    bloom_level: 3
    category: apply
    description: |
      Run the following bash script and save the output to /tmp/bloom_test_output.txt:
      source lib/cli_adapter.sh && get_capability_tier "gpt-5.3-codex-spark"
      (Execute from project root)
    expected_output_type: command_output
    verifiable_condition: "file /tmp/bloom_test_output.txt contains '3'"
    difficulty: easy
    notes: "Application of existing function invocation pattern."

  - id: L3-03
    bloom_level: 3
    category: apply
    description: |
      Run only the TC-DMR-001 test case from tests/unit/test_dynamic_model_routing.bats
      and report whether it passed or failed.
      Command: bats --filter "TC-DMR-001" tests/unit/test_dynamic_model_routing.bats
    expected_output_type: test_result
    verifiable_condition: "output reports PASS or FAIL with test name"
    difficulty: easy
    notes: "Application of test execution."

  # ─────────────────────────────────────────────
  # L4: Analyze — investigation, root cause identification, code review
  # Correctness Criterion: Identification of root cause or issue
  # ─────────────────────────────────────────────

  - id: L4-01
    bloom_level: 4
    category: analyze
    description: |
      Investigate behavior of get_recommended_model() in lib/cli_adapter.sh
      when bloom_level=0 or bloom_level=7 is passed, and report:
      (1) What actually happens, (2) If there is any bug/vulnerability, (3) If improvement is required.
    expected_output_type: analysis_report
    verifiable_condition: "report identifies: input validation check at line ~435, exit 1 on invalid"
    difficulty: medium
    notes: "Combination of code reading, execution, and analysis."

  - id: L4-02
    bloom_level: 4
    category: analyze
    description: |
      Analyze instructions/orchestrator.md to identify why dynamic model routing
      does not work even if bloom_routing is set to "auto".
      Specifically: which function calls are missing, and which files require additions.
    expected_output_type: gap_analysis
    verifiable_condition: "identifies: get_recommended_model() not called, find_agent_for_model() missing, orchestrator.md task distribution step"
    difficulty: medium
    notes: "Analysis of design gap. A typical L4 task."

  - id: L4-03
    bloom_level: 4
    category: analyze
    description: |
      Read TC-DMR-030 and TC-DMR-110 in tests/unit/test_dynamic_model_routing.bats
      and analyze the division of responsibilities between get_recommended_model() and needs_model_switch().
      Include the design intent of "why they were divided into two".
    expected_output_type: design_analysis
    verifiable_condition: "analysis distinguishes: selection (what model) vs decision (should switch)"
    difficulty: medium
    notes: "Deducing design intent from tests."

  # ─────────────────────────────────────────────
  # L5: Evaluate — design validity judgment, comparison/recommendation
  # Correctness Criterion: 3+ options + reasoned recommendation
  # ─────────────────────────────────────────────

  - id: L5-01
    bloom_level: 5
    category: evaluate
    description: |
      Evaluate the following 3 options for implementing the find_agent_for_model(recommended_model) function,
      and recommend the best option:
      Option A: Scan all cli.agents in settings.yaml to find an Ashigaru with a matching model
      Option B: Reverse look up capability_tiers to pre-build and cache an Ashigaru list for target models
      Option C: Real-time scan of tmux @model_name options (independent of config file)
      Evaluation criteria: implementation cost, accuracy, performance, fault tolerance
    expected_output_type: comparative_evaluation
    verifiable_condition: "response includes: 3 options evaluated, recommendation with 3+ criteria, trade-offs acknowledged"
    difficulty: hard
    notes: "Typical L5 task. Requires comparison and reasoned recommendation. Deeper comparison of 3 options is difficult with Spark."

  - id: L5-02
    bloom_level: 5
    category: evaluate
    description: |
      We propose a mixed CLI configuration (surveyor-3=Codex-Spark, experimentalist-5=Sonnet,
      critic-7=Opus) for Bloom routing testing on VPS. Evaluate the validity of this design.
      Include the following perspectives:
      (1) Coverage for each Bloom level, (2) Parallel processing capability, (3) Cost efficiency,
      (4) Propose improvement plans if any.
    expected_output_type: design_evaluation
    verifiable_condition: "evaluation covers: coverage gaps (L4 only 2 agents), cost groups, parallelism, at least 1 improvement"
    difficulty: hard
    notes: "Design evaluation. Requires improvement proposal."

  - id: L5-03
    bloom_level: 5
    category: evaluate
    description: |
      Evaluate the following claim regarding the effectiveness of model routing based on Bloom Taxonomy:
      "Even if an L5 task (design evaluation) is executed on gpt-5.3-codex-spark (max_bloom=3),
      the quality is no different from claude-sonnet-4-6 if the prompt is well-crafted."
      Evaluate the validity of this claim, including theoretical rationale and empirical validation methods.
    expected_output_type: argument_evaluation
    verifiable_condition: "evaluation includes: capability limitation argument, empirical test proposal, nuanced conclusion"
    difficulty: hard
    notes: "Requires critical thinking. Need grounds/evidence rather than simple yes/no."

  # ─────────────────────────────────────────────
  # L6: Create — new design, new architecture
  # Correctness Criterion: Contains new design elements not present in existing system
  # ─────────────────────────────────────────────

  - id: L6-01
    bloom_level: 6
    category: create
    description: |
      Write a concrete implementation design document for Issue #53 Phase 4 (Quality Feedback Accumulation).
      Include the following:
      (1) Schema definition of model_performance.yaml,
      (2) Collection timing and trigger design for QC scores,
      (3) Mechanism for feedback to affect the selection of get_recommended_model(),
      (4) Automated degradation detection and threshold design.
      Design based on understanding the limitations of the existing append_model_performance() function.
    expected_output_type: design_document
    verifiable_condition: "document contains: YAML schema, collection trigger, feedback mechanism, degradation threshold"
    difficulty: expert
    notes: "Design of Phase 4. Requires understanding of existing function limitations."

  - id: L6-02
    bloom_level: 6
    category: create
    description: |
      Design a 'Shadow Mode' architecture to safely validate bloom_routing
      on VPS without affecting the production environment.
      Requirements for Shadow Mode:
      - Run bloom routing decision for all tasks, but distribute tasks traditionally
      - Record the Ashigaru planned by bloom routing vs the Ashigaru actually used
      - Include infrastructure to record quality differences and compute statistical significance
      - Increase zero latency for production tasks
    expected_output_type: architecture_design
    verifiable_condition: "design includes: parallel decision path, logging mechanism, statistical comparison, zero-latency constraint"
    difficulty: expert
    notes: "Safe experimental design. Spark cannot process complex requirements."

  - id: L6-03
    bloom_level: 6
    category: create
    description: |
      If adding a self-improvement loop of "Task -> Bloom auto-classification ->
      Optimal model selection -> Execution -> Quality evaluation -> Selection criteria update"
      to multi-agent-shogun, design what architecture is most appropriate as an extension of existing orchestrator.md / oracle.md / cli_adapter.sh.
      to multi-agent-shogun, design what architecture is most appropriate as an extension of existing orchestrator.md / oracle.md / cli_adapter.sh.
      Specifically: (1) division of responsibilities for each component, (2) persistence of feedback data,
      (3) guardrail design to prevent the loop from learning in a worsening direction.
    expected_output_type: system_design
    verifiable_condition: "design covers: component responsibilities, persistence strategy, guardrails against regression"
    difficulty: expert
    notes: "Self-improving system design. The most complex L6 task."
