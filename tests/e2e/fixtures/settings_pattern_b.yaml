# settings_pattern_b.yaml — Pattern B: Claude + Codex mixed
# Used for E2E testing with mock CLIs
language: ja
shell: bash
display_mode: silent

cli:
  default: claude
  agents:
    orchestrator:
      type: claude
      model: sonnet
    surveyor:
      type: codex
    critic:
      type: claude
      model: sonnet
  validation:
    fallback: claude
    strict: false
