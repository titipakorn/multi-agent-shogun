# settings_pattern_a.yaml — Pattern A: All Claude
# Used for E2E testing with mock CLIs
language: ja
shell: bash
display_mode: silent

cli:
  default: claude
  agents:
    orchestrator:
      type: claude
      model: sonnet
    surveyor:
      type: claude
      model: sonnet
    critic:
      type: claude
      model: sonnet
  validation:
    fallback: claude
    strict: false
