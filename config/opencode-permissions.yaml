# OpenCode role-specific permission matrix.
#
# This file is consumed by scripts/build_instructions.sh to generate
# `.opencode/agents/*.md` permission frontmatter at build time. Keep the matrix
# focused on file boundaries that matter for role separation.

common:
  edit_deny:
    - AGENTS.md
    - .github/copilot-instructions.md
    - .opencode/agents/*.md
    - agents/default/agent.yaml
    - agents/default/system.md
    - config/opencode-permissions.yaml
    - config/opencode-tui.json
    - instructions/generated/*
    - queue/inbox/*.yaml

roles:
  shogun:
    question: deny
    read_deny:
      - queue/inbox/*
      - queue/tasks/*.yaml
      - queue/tasks/pending.yaml
      - queue/shogun_to_orchestrator_archive.yaml
    read_allow:
      - queue/inbox/shogun.yaml
      - queue/shogun_to_orchestrator.yaml
      - queue/ntfy_inbox.yaml
      - queue/reports/*
      - dashboard.md
      - saytask/tasks.yaml
      - saytask/streaks.yaml
      - context/*
    edit_deny:
      - queue/tasks/*.yaml
      - queue/tasks/pending.yaml
      - queue/reports/*
      - queue/shogun_to_orchestrator_archive.yaml
      - dashboard.md
      - saytask/*
    edit_allow:
      - queue/shogun_to_orchestrator.yaml
      - queue/ntfy_inbox.yaml
      - saytask/tasks.yaml
      - saytask/streaks.yaml

  orchestrator:
    question: deny
    read_deny:
      - queue/inbox/*
      - queue/ntfy_inbox.yaml
      - saytask/tasks.yaml
    read_allow:
      - queue/inbox/orchestrator.yaml
      - queue/shogun_to_orchestrator.yaml
      - queue/shogun_to_orchestrator_archive.yaml
      - queue/tasks/*.yaml
      - queue/tasks/pending.yaml
      - queue/reports/*_report.yaml
      - dashboard.md
      - saytask/streaks.yaml
      - context/*
    edit_deny:
      - queue/ntfy_inbox.yaml
      - queue/reports/*
      - saytask/tasks.yaml
    edit_allow:
      - queue/shogun_to_orchestrator.yaml
      - queue/shogun_to_orchestrator_archive.yaml
      - queue/tasks/*.yaml
      - queue/tasks/pending.yaml
      - dashboard.md
      - saytask/streaks.yaml

  specialist:
    # Generic block applied to all task-layer specialists:
    # surveyor, critic, architect, experimentalist, analyst, ablation_planner, writer, observer, council.
    # {agent_id} expands to the specialist's role at build time.
    question: deny
    read_deny:
      - queue/inbox/*
      - queue/tasks/*
      - queue/reports/*
      - queue/ntfy_inbox.yaml
      - queue/shogun_to_orchestrator_archive.yaml
      - dashboard.md
      - saytask/*
    read_allow:
      - queue/inbox/{agent_id}.yaml
      - queue/tasks/{agent_id}.yaml
      - queue/reports/{agent_id}_report.yaml
      - queue/shogun_to_orchestrator.yaml
      - context/*
    edit_deny:
      - queue/tasks/*
      - queue/reports/*
      - queue/ntfy_inbox.yaml
      - queue/shogun_to_orchestrator.yaml
      - queue/shogun_to_orchestrator_archive.yaml
      - dashboard.md
      - saytask/*
    edit_allow:
      - queue/tasks/{agent_id}.yaml
      - queue/reports/{agent_id}_report.yaml

  telegram:
    question: deny
    read_deny:
      - queue/inbox/*
      - queue/tasks/*
      - queue/reports/*
      - queue/shogun_to_orchestrator_archive.yaml
      - saytask/*
    read_allow:
      - queue/inbox/telegram.yaml
      - queue/shogun_to_orchestrator.yaml
      - queue/ntfy_inbox.yaml
      - dashboard.md
      - context/*
    edit_deny:
      - queue/tasks/*
      - queue/reports/*
      - queue/shogun_to_orchestrator.yaml
      - queue/shogun_to_orchestrator_archive.yaml
      - queue/ntfy_inbox.yaml
      - dashboard.md
      - saytask/*
 
